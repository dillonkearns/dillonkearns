name: Update package releases
on:
  schedule:
    # Runs every 3 hours
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  update-readme:
    name: Update this repo's README with latest package releases
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: script/package-lock.json
      - name: Install dependencies
        run: cd script && npm install
      - name: Run tests
        run: cd script && npx elm-test
      - name: Run update script
        run: cd script && npx elm-pages run src/UpdateReleases.elm
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet README.md || (git add README.md && git commit -m "Update package releases")
      - name: Push
        run: git push
